<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIIT Caminadora</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --easy: #38bdf8;
    --mod: #4ade80;
    --max: #f87171;
    --white: #f0f0f5;
    --muted: #555566;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .glow-bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }
  .glow-bg::before, .glow-bg::after {
    content: ''; position: absolute;
    border-radius: 50%; filter: blur(120px);
    opacity: 0.12; transition: background 1s ease;
  }
  .glow-bg::before {
    width: 60vw; height: 60vw; top: -10%; left: -10%;
    background: var(--current-color, #38bdf8);
  }
  .glow-bg::after {
    width: 50vw; height: 50vw; bottom: -10%; right: -10%;
    background: var(--current-color, #38bdf8);
  }

  .container {
    position: relative; z-index: 1;
    width: min(420px, 96vw);
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    padding: 16px 0;
  }

  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    letter-spacing: 0.25em; color: var(--muted);
  }

  /* ── Duration picker ── */
  .picker-card {
    width: 100%;
    background: var(--card);
    border-radius: 24px;
    padding: 20px 20px 16px;
    border: 1px solid #ffffff0d;
    box-shadow: 0 12px 40px #00000050;
  }
  .picker-label {
    font-size: 0.7rem; letter-spacing: 0.18em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 12px; text-align: center;
  }
  .picker-options {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .picker-btn {
    background: #ffffff08; border: 1.5px solid #ffffff10;
    border-radius: 14px; padding: 14px 8px;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    color: var(--white);
  }
  .picker-btn:active { transform: scale(0.95); }
  .picker-btn.selected {
    background: #ffffff15;
    border-color: var(--white);
  }
  .picker-btn .min-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; line-height: 1; color: var(--white);
  }
  .picker-btn .min-label {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .picker-btn .min-level {
    font-size: 0.7rem; font-weight: 600; margin-top: 2px;
  }
  .picker-btn[data-key="10"] .min-level { color: var(--easy); }
  .picker-btn[data-key="15"] .min-level { color: var(--mod); }
  .picker-btn[data-key="25"] .min-level { color: var(--max); }

  /* ── Main card ── */
  .main-card {
    width: 100%; background: var(--card);
    border-radius: 28px; padding: 28px 28px 24px;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    border: 1px solid #ffffff0d;
    box-shadow: 0 24px 80px #00000060;
  }

  .interval-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 20vw, 5.5rem);
    line-height: 1; transition: color 0.6s ease;
    color: var(--easy); text-shadow: 0 0 40px currentColor;
  }

  .speed-display {
    font-size: clamp(1rem, 4vw, 1.2rem);
    font-weight: 300; color: #ffffff80; letter-spacing: 0.1em;
  }
  .speed-display span { font-weight: 600; color: var(--white); }

  .timer-wrap {
    position: relative; width: 170px; height: 170px; margin: 8px 0;
  }
  .timer-svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .timer-track { fill: none; stroke: #ffffff10; stroke-width: 8; }
  .timer-arc {
    fill: none; stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.6s ease;
  }
  .timer-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  .timer-seconds {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.4rem; line-height: 1; transition: color 0.6s ease;
  }
  .timer-sublabel {
    font-size: 0.62rem; letter-spacing: 0.18em;
    color: var(--muted); text-transform: uppercase;
  }

  .total-progress-wrap { width: 100%; }
  .total-progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.7rem; color: var(--muted);
    letter-spacing: 0.08em; margin-bottom: 6px; text-transform: uppercase;
  }
  .total-bar {
    width: 100%; height: 4px;
    background: #ffffff0f; border-radius: 99px; overflow: hidden;
  }
  .total-bar-fill {
    height: 100%; border-radius: 99px;
    background: var(--white); transition: width 1s linear; opacity: 0.5;
  }

  .next-card {
    width: 100%; background: #ffffff06;
    border: 1px solid #ffffff0a; border-radius: 16px;
    padding: 12px 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .next-label-text {
    font-size: 0.68rem; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 2px;
  }
  .next-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; }
  .next-speed { font-size: 0.72rem; color: #ffffff60; }
  .next-duration { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: #ffffff40; }

  .interval-dots {
    display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    opacity: 0.25; transition: opacity 0.4s, transform 0.3s;
  }
  .dot.done     { opacity: 0.12; }
  .dot.active   { opacity: 1; transform: scale(1.5); }
  .dot.easy     { background: var(--easy); }
  .dot.moderado { background: var(--mod); }
  .dot.maximo   { background: var(--max); }

  .btn-row { display: flex; gap: 12px; width: 100%; }
  .btn {
    flex: 1; border: none; border-radius: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    padding: 15px; transition: transform 0.1s, opacity 0.2s;
    letter-spacing: 0.03em;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--white); color: var(--bg); flex: 2; }
  .btn-secondary { background: #ffffff10; color: var(--white); }

  .finish-overlay {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 99; display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 40px;
  }
  .finish-overlay.show { display: flex; }
  .finish-emoji { font-size: 4rem; }
  .finish-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
    letter-spacing: 0.1em; color: var(--mod); text-shadow: 0 0 40px var(--mod);
  }
  .finish-sub { color: var(--muted); font-size: 0.95rem; }
  .finish-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; width: 100%; max-width: 300px; margin: 6px 0;
  }
  .stat-box {
    background: var(--card); border-radius: 16px; padding: 16px;
    border: 1px solid #ffffff0d;
  }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--white); }
  .stat-name { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>

<div class="glow-bg"></div>

<div class="container">
  <div class="app-title">HIIT · Caminadora</div>

  <div class="picker-card">
    <div class="picker-label">¿Cuánto tiempo tienes hoy?</div>
    <div class="picker-options">
      <button class="picker-btn" data-key="10" onclick="selectPlan('10')">
        <div class="min-num">10</div>
        <div class="min-label">minutos</div>
        <div class="min-level">Express</div>
      </button>
      <button class="picker-btn selected" data-key="15" onclick="selectPlan('15')">
        <div class="min-num">15</div>
        <div class="min-label">minutos</div>
        <div class="min-level">Regular</div>
      </button>
      <button class="picker-btn" data-key="25" onclick="selectPlan('25')">
        <div class="min-num">25</div>
        <div class="min-label">minutos</div>
        <div class="min-level">Completo</div>
      </button>
    </div>
  </div>

  <div class="main-card">
    <div class="interval-label" id="intervalLabel">LISTO</div>
    <div class="speed-display">Velocidad: <span id="speedText">—</span> km/h</div>

    <div class="timer-wrap">
      <svg class="timer-svg" width="170" height="170" viewBox="0 0 170 170">
        <circle class="timer-track" cx="85" cy="85" r="78"/>
        <circle class="timer-arc" id="timerArc" cx="85" cy="85" r="78"
          stroke="#38bdf8" stroke-dasharray="490.09" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center">
        <div class="timer-seconds" id="timerSeconds">—</div>
        <div class="timer-sublabel">segundos</div>
      </div>
    </div>

    <div class="total-progress-wrap">
      <div class="total-progress-label">
        <span>Progreso</span>
        <span id="totalTimeLeft">15:00</span>
      </div>
      <div class="total-bar"><div class="total-bar-fill" id="totalFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="interval-dots" id="dotsRow"></div>

  <div class="next-card">
    <div>
      <div class="next-label-text">Siguiente</div>
      <div class="next-name" id="nextName">—</div>
      <div class="next-speed" id="nextSpeed">— km/h</div>
    </div>
    <div class="next-duration" id="nextDuration">—</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="startBtn" onclick="startWorkout()">COMENZAR</button>
    <button class="btn btn-secondary" id="resetBtn" onclick="resetWorkout()" style="display:none">↺</button>
  </div>
</div>

<div class="finish-overlay" id="finishOverlay">
  <div class="finish-emoji">🏃‍♀️</div>
  <div class="finish-title">¡COMPLETADO!</div>
  <div class="finish-sub" id="finishSub">Entrenamiento terminado</div>
  <div class="finish-stats">
    <div class="stat-box">
      <div class="stat-num" id="statMax">—</div>
      <div class="stat-name">Sprints máximo</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statMins">—</div>
      <div class="stat-name">Minutos totales</div>
    </div>
  </div>
  <button class="btn btn-primary" style="max-width:300px;width:100%" onclick="resetWorkout()">VOLVER A EMPEZAR</button>
</div>

<script>
const PLANS = {
  '10': [
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60 },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 60 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60 },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 60 },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60 },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60 },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 60 },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60 },
  ],
  '15': [
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 120 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 120 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 120 },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 60  },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
  ],
  '25': [
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 120 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 120 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 120 },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 60  },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 180 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 120 },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 60  },
    { name: 'Máximo',   type: 'maximo',   speed: '10-12', duration: 60  },
    { name: 'Moderado', type: 'moderado', speed: '7-9',   duration: 120 },
    { name: 'Fácil',    type: 'easy',     speed: '5-6',   duration: 60  },
  ],
};

const COLORS = { easy: '#38bdf8', moderado: '#4ade80', maximo: '#f87171' };
const CIRCUMFERENCE = 2 * Math.PI * 78;

let selectedPlan = '15';
let INTERVALS = PLANS['15'];
let TOTAL_SECS = INTERVALS.reduce((a, b) => a + b.duration, 0);

let currentIdx = 0, secondsLeft = 0, totalLeft = 0;
let ticker = null, running = false, isPaused = false, maxCount = 0;

function selectPlan(key) {
  if (running) return;
  selectedPlan = key;
  INTERVALS = PLANS[key];
  TOTAL_SECS = INTERVALS.reduce((a, b) => a + b.duration, 0);
  totalLeft = TOTAL_SECS;
  document.querySelectorAll('.picker-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.key === key));
  document.getElementById('totalTimeLeft').textContent = fmtMSS(TOTAL_SECS);
  buildDots();
}

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx() { if (!actx) actx = new AudioCtx(); return actx; }
function beep(type) {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'change') {
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
    } else if (type === 'warning') {
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
    } else if (type === 'finish') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
    }
  } catch(e) {}
}

function setColor(type) {
  const c = COLORS[type];
  document.getElementById('intervalLabel').style.color = c;
  document.getElementById('timerSeconds').style.color = c;
  document.getElementById('timerArc').style.stroke = c;
  document.documentElement.style.setProperty('--current-color', c);
}
function updateArc(s, total) {
  document.getElementById('timerArc').style.strokeDashoffset = CIRCUMFERENCE * (1 - s/total);
}
function fmtMSS(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function buildDots() {
  const row = document.getElementById('dotsRow');
  row.innerHTML = '';
  INTERVALS.forEach((iv, i) => {
    const d = document.createElement('div');
    d.className = `dot ${iv.type}`; d.id = `dot-${i}`;
    row.appendChild(d);
  });
}
function updateDots(idx) {
  INTERVALS.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    d.classList.remove('active','done');
    if (i < idx) d.classList.add('done');
    else if (i === idx) d.classList.add('active');
  });
}
function showInterval(idx) {
  const iv = INTERVALS[idx];
  document.getElementById('intervalLabel').textContent = iv.name.toUpperCase();
  document.getElementById('speedText').textContent = iv.speed;
  setColor(iv.type);
  updateDots(idx);
  const next = INTERVALS[idx + 1];
  if (next) {
    document.getElementById('nextName').textContent = next.name;
    document.getElementById('nextSpeed').textContent = `${next.speed} km/h`;
    document.getElementById('nextDuration').textContent = `${next.duration/60}'`;
  } else {
    document.getElementById('nextName').textContent = '¡Último!';
    document.getElementById('nextSpeed').textContent = '—';
    document.getElementById('nextDuration').textContent = '—';
  }
}
function tick() {
  secondsLeft--; totalLeft--;
  if (secondsLeft <= 3 && secondsLeft > 0) beep('warning');
  document.getElementById('timerSeconds').textContent = secondsLeft;
  updateArc(secondsLeft, INTERVALS[currentIdx].duration);
  document.getElementById('totalFill').style.width = `${((TOTAL_SECS-totalLeft)/TOTAL_SECS)*100}%`;
  document.getElementById('totalTimeLeft').textContent = fmtMSS(totalLeft);
  if (secondsLeft <= 0) {
    currentIdx++;
    if (currentIdx >= INTERVALS.length) { finishWorkout(); return; }
    loadInterval(currentIdx); beep('change');
  }
}
function loadInterval(idx) {
  const iv = INTERVALS[idx];
  secondsLeft = iv.duration;
  if (iv.type === 'maximo') maxCount++;
  showInterval(idx);
  document.getElementById('timerSeconds').textContent = secondsLeft;
  updateArc(secondsLeft, iv.duration);
  document.getElementById('timerArc').style.strokeDasharray = CIRCUMFERENCE;
}
function startWorkout() {
  if (running && !isPaused) {
    isPaused = true; clearInterval(ticker);
    document.getElementById('startBtn').textContent = 'CONTINUAR'; return;
  }
  if (isPaused) {
    isPaused = false; ticker = setInterval(tick, 1000);
    document.getElementById('startBtn').textContent = 'PAUSAR'; return;
  }
  running = true; isPaused = false;
  currentIdx = 0; totalLeft = TOTAL_SECS; maxCount = 0;
  document.querySelectorAll('.picker-btn').forEach(b => b.style.opacity = '0.35');
  loadInterval(0); beep('change');
  ticker = setInterval(tick, 1000);
  document.getElementById('startBtn').textContent = 'PAUSAR';
  document.getElementById('resetBtn').style.display = 'block';
}
function resetWorkout() {
  clearInterval(ticker);
  running = false; isPaused = false; currentIdx = 0; maxCount = 0;
  totalLeft = TOTAL_SECS;
  document.getElementById('intervalLabel').textContent = 'LISTO';
  document.getElementById('intervalLabel').style.color = '#38bdf8';
  document.getElementById('speedText').textContent = '—';
  document.getElementById('timerSeconds').textContent = '—';
  document.getElementById('timerSeconds').style.color = '#f0f0f5';
  document.getElementById('timerArc').style.strokeDashoffset = 0;
  document.getElementById('timerArc').style.stroke = '#38bdf8';
  document.documentElement.style.setProperty('--current-color','#38bdf8');
  document.getElementById('totalFill').style.width = '0%';
  document.getElementById('totalTimeLeft').textContent = fmtMSS(TOTAL_SECS);
  document.getElementById('nextName').textContent = '—';
  document.getElementById('nextSpeed').textContent = '— km/h';
  document.getElementById('nextDuration').textContent = '—';
  document.getElementById('startBtn').textContent = 'COMENZAR';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('finishOverlay').classList.remove('show');
  document.querySelectorAll('.picker-btn').forEach(b => b.style.opacity = '1');
  buildDots();
}
function finishWorkout() {
  clearInterval(ticker); running = false;
  beep('finish'); setTimeout(() => beep('finish'), 400);
  document.getElementById('statMax').textContent = maxCount;
  document.getElementById('statMins').textContent = selectedPlan;
  document.getElementById('finishSub').textContent = `Entrenamiento terminado · ${selectedPlan} minutos`;
  document.getElementById('finishOverlay').classList.add('show');
}

// Init
selectPlan('15');
</script>
</body>
</html>
